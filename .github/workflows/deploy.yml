name : Deploy Node app on ec2 

on: 
 push:
   - branches:
       - main

jobs: 
  deploy:
    run-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Deploy Via SSH
        uses: appleboy/ssh-actions@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: root 
          key: ${{ secrets.SSH_KEY }}
          script: |
            cd /home/ubuntu/node-application-github-actions
            git pull
            docker compose up -d --build    